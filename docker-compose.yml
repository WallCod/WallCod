version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wallcod_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wallcod_db
      POSTGRES_USER: wallcod
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wallcod -d wallcod_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wallcod_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: wallcod_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wallcod_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wallcod_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://wallcod:${POSTGRES_PASSWORD:-changeme}@postgres:5432/wallcod_db
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DEBUG: ${DEBUG:-False}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - wallcod_network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wallcod_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NODE_ENV: production
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - wallcod_network

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: wallcod_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - wallcod_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  wallcod_network:
    driver: bridge
